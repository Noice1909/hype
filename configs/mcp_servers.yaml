# MCP server connection config — each can use stdio, SSE, or HTTP transport
#
# NEVER hardcode credentials or connection strings in this file. Use ${VAR}
# placeholders — they're resolved from Settings (pydantic-settings) at runtime,
# which in turn reads from .env or container env vars.
servers:
  neo4j:
    transport: "http"
    url: "${NEO4J_MCP_URL}"

  # DDA MongoDB — dedicated cluster for Data Delivery Automation.
  # The MongoDB MCP server is the same image but handles different
  # clusters via per-request headers. Every agent that needs a different
  # MongoDB target gets its own entry here with its own credentials.
  dda-mongodb:
    transport: "http"
    url: "${DDA_MONGODB_MCP_URL}"
    headers:
      X-MongoDB-Connection-String: "${DDA_MONGODB_CONNECTION_STRING}"
      X-MongoDB-Database: "${DDA_MONGODB_DATABASE}"

  github:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

  jira:
    transport: "sse"
    url: "${JIRA_MCP_URL}"

  confluence:
    transport: "sse"
    url: "${CONFLUENCE_MCP_URL}"

  oracle:
    transport: "stdio"
    command: "python"
    args: ["-m", "oracle_mcp_server"]
    env:
      ORACLE_DSN: "${ORACLE_DSN}"

  dataplex:
    transport: "http"
    url: "${DATAPLEX_MCP_URL}"

  autosys:
    transport: "stdio"
    command: "python"
    args: ["-m", "autosys_mcp_server"]
    env:
      AUTOSYS_API_URL: "${AUTOSYS_API_URL}"
