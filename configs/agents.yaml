agents:
  diva:
    display_name: "DIVA"
    description: >-
      The face of the system. Handles greetings, general conversation,
      session summaries, remembering user context, irrelevant questions,
      and anything that does not need a data source agent. DIVA introduces
      itself, explains capabilities, and responds with personality.
    scope:
      - "hello"
      - "hi"
      - "greeting"
      - "help"
      - "what can you do"
      - "who are you"
      - "remember"
      - "summary"
      - "thank"
      - "bye"
      - "poem"
      - "joke"
      - "general"
      - "irrelevant"
      - "capital"
      - "weather"
    mcp_server: "none"
    prompt_template: "diva_agent.jinja2"
    temperature: 0.7
    max_tool_calls: 0
    enabled: true

  neo4j:
    display_name: "Knowledge Graph Agent"
    description: >-
      Static organizational metadata from the enterprise knowledge graph.
      Answers "what exists" and "how things relate" questions: which
      applications belong to which domain, team ownership, platform
      inventory, server topology, data lineage layers (raw → sanitized →
      curated → ADS), table catalog, migration programs and waves.
      Does NOT know operational status of pipeline runs, build results,
      or deployment progress — for that use the DDA agent.
    scope:
      - "org structure"
      - "data lineage"
      - "application catalog"
      - "application"
      - "platform inventory"
      - "team ownership"
      - "business unit"
      - "domain"
      - "raw table"
      - "curated table"
      - "sanitized table"
      - "ADS"
      - "migration program"
      - "migration wave"
      - "server topology"
      - "network topology"
    mcp_server: "neo4j"
    prompt_template: "neo4j_agent.jinja2"
    temperature: 0
    max_tool_calls: 5
    enabled: true

  dda-agent:
    display_name: "DDA Agent — Data Delivery Automation"
    description: >-
      Operational status and artifacts from the Data Delivery Automation
      (DDA/DMA) internal tool. Queries the consumer_datapipeline_uat
      MongoDB cluster for: onboarding request status, generated artifacts
      (SQL/DDL/JIL/runbooks), Jenkins build results, UrbanCode deployment
      status, workflow progress per Jira ticket, ingestion source-to-
      target mappings, and questionnaire responses. Route when the user
      explicitly mentions DDA, DMA, pipeline onboarding, DMA- / STATIC- /
      METADATA- collections, Jenkins builds, UCD/UrbanCode deploys,
      artifact generation, JIL generation, Jira intake validation, or
      questionnaire. Does NOT know the org-wide application catalog or
      data lineage graph — for that use the Neo4j agent. Does NOT manage
      Autosys job schedules — for that use the Autosys agent.
    scope:
      - "DDA"
      - "DMA"
      - "data delivery automation"
      - "data movement automation"
      - "pipeline onboarding"
      - "onboarding request"
      - "ingestion catalog"
      - "source to target"
      - "artifact generation"
      - "artifact catalog"
      - "generated artifact"
      - "generated sql"
      - "generated ddl"
      - "generated jil"
      - "generated runbook"
      - "jenkins build"
      - "build result"
      - "build status"
      - "urbancode"
      - "ucd deployment"
      - "workflow status"
      - "jira intake"
      - "jira story intake"
      - "questionnaire"
      - "requirement catalog"
      - "metadata collection"
      - "connection json"
      - "feed artifact"
      - "sor definition"
      - "pattern time saving"
    mcp_server: "dda-mongodb"
    prompt_template: "dda_agent.jinja2"
    temperature: 0
    max_tool_calls: 20
    enabled: true

  oracle:
    display_name: "Oracle Agent"
    description: "Structured relational data, reports, analytics"
    scope:
      - "relational data"
      - "reports"
      - "SQL"
      - "Oracle table"
    mcp_server: "oracle"
    prompt_template: "oracle_agent.jinja2"
    temperature: 0
    max_tool_calls: 5
    enabled: false

  dataplex:
    display_name: "Dataplex Agent"
    description: "Data catalog, quality scores, governance metadata"
    scope:
      - "data catalog"
      - "data quality"
      - "governance"
      - "BigQuery"
    mcp_server: "dataplex"
    prompt_template: "dataplex_agent.jinja2"
    temperature: 0
    max_tool_calls: 3
    enabled: false

  github:
    display_name: "GitHub Agent"
    description: "Repositories, PRs, issues, code, CI/CD"
    scope:
      - "code"
      - "pull request"
      - "repository"
      - "commit"
      - "release"
    mcp_server: "github"
    prompt_template: "github_agent.jinja2"
    temperature: 0
    max_tool_calls: 5
    enabled: false

  confluence:
    display_name: "Confluence Agent"
    description: "Documentation, runbooks, design docs, team wikis"
    scope:
      - "documentation"
      - "runbook"
      - "design doc"
      - "wiki"
    mcp_server: "confluence"
    prompt_template: "confluence_agent.jinja2"
    temperature: 0
    max_tool_calls: 3
    enabled: false

  jira:
    display_name: "Jira Agent"
    description: "Tickets, sprints, epics, project status, assignments"
    scope:
      - "ticket"
      - "sprint"
      - "bug"
      - "epic"
      - "assigned"
      - "status"
    mcp_server: "jira"
    prompt_template: "jira_agent.jinja2"
    temperature: 0
    max_tool_calls: 3
    enabled: false

  autosys:
    display_name: "Autosys Agent"
    description: "Batch job schedules, statuses, dependencies, failure history"
    scope:
      - "batch job"
      - "job schedule"
      - "job failure"
      - "job dependency"
    mcp_server: "autosys"
    prompt_template: "autosys_agent.jinja2"
    temperature: 0
    max_tool_calls: 3
    enabled: false

router:
  temperature: 0
  max_tokens: 256

execution:
  parallel_timeout_seconds: 30
  max_agents_per_query: 4
